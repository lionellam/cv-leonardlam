<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonard Lam Song Kuan — Violinist & Music Educator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</head>
<body>
  <div class="top-rule"></div>
  <nav class="site-nav">
    <div class="nav-inner">
      <ul>
        <li><a href="#header">Summary</a></li>
        <li><a href="#experience-header">Experience</a></li>
        <li><a href="#skills-header">Skills</a></li>
        <li><a href="#certifications-header">Diplomas</a></li>
        <li><a href="#education-header">Education</a></li>
        <li><a href="#awards-header">Awards</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="hamburger" onclick="document.querySelector('.mobile-menu').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
    <div class="mobile-menu">
      <a href="#header" onclick="this.parentElement.classList.remove('open')">Summary</a>
      <a href="#experience-header" onclick="this.parentElement.classList.remove('open')">Experience</a>
      <a href="#skills-header" onclick="this.parentElement.classList.remove('open')">Skills</a>
      <a href="#certifications-header" onclick="this.parentElement.classList.remove('open')">Diplomas</a>
      <a href="#education-header" onclick="this.parentElement.classList.remove('open')">Education</a>
      <a href="#awards-header" onclick="this.parentElement.classList.remove('open')">Awards</a>
    </div>
  </nav>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <div class="page">
    <header id="header">
      <div class="header-left">
        <div class="job-title" id="p-title"></div>
        <h1 id="p-name"></h1>
        <div class="title-rule"></div>
        <div class="postnominals" id="p-postnom"></div>
      </div>
      <div class="header-right">
        <ul class="contact-list" id="p-contacts"></ul>
        <a class="download-btn" href="files/leonard-lam-cv.pdf" target="_blank" rel="noopener noreferrer">↓ Download CV</a>
      </div>
    </header>

    <div class="summary" id="summary-container"></div>

    <section class="section">
      <div class="section-header" id="experience-header">
        <h2 class="section-title">Professional Experience</h2><div class="section-rule"></div>
      </div>
      <div id="experience-container"></div>
      <div class="employer-block">
        <div class="employer-name">Earlier Career</div><div class="employer-role">2002 – 2013</div>
        <ul class="earlier-list" id="earlier-career-list"></ul>
      </div>
    </section>

    <section class="section">
      <div class="section-header" id="skills-header">
        <h2 class="section-title">Skills</h2><div class="section-rule"></div>
      </div>
      <div class="two-col" id="skills-container"></div>
      <div class="section-header" id="certifications-header" style="margin-top: 40px;">
        <h2 class="section-title">Professional Diplomas</h2><div class="section-rule"></div>
      </div>
      <div class="cert-list" id="certs-container"></div>
    </section>

    <section class="section">
      <div class="section-header" id="education-header">
        <h2 class="section-title">Education</h2><div class="section-rule"></div>
      </div>
      <div id="edu-container"></div>
    </section>

    <section class="section" style="border-bottom: none;">
      <div class="section-header" id="awards-header">
        <h2 class="section-title">Awards & Achievements</h2><div class="section-rule"></div>
      </div>
      <div id="awards-container"></div>
    </section>

    <footer>
      <p id="footer-copy"></p>
      <p><a id="footer-email" href=""></a></p>
    </footer>
  </div>

  <!-- LOAD CONTENT DATA -->
  <script src="content.js"></script>

  <!-- RENDER LOGIC -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const d = RESUME_DATA;

      // Header
      document.getElementById('p-title').textContent = d.profile.jobTitle;
      document.getElementById('p-name').textContent = d.profile.name;
      document.getElementById('p-postnom').textContent = d.profile.postnominals;
      document.getElementById('p-contacts').innerHTML = d.profile.contacts.map(c => `<li><a href="${c.link}">${c.label}</a></li>`).join('');

      // Summary
      document.getElementById('summary-container').innerHTML = d.summary.map(p => `<p>${p}</p>`).join('');

      // Experience
      document.getElementById('experience-container').innerHTML = d.experience.map(e => `
        <div class="employer-block">
          <div class="employer-name">${e.employer}</div>
          <div class="employer-role">${e.role}</div>
          ${e.projects.map(p => `
            <div class="project">
              <div class="project-period">${p.period}</div>
              <div>
                <div class="project-name">${p.title}</div>
                <ul>${p.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');

      // Earlier Career
      document.getElementById('earlier-career-list').innerHTML = d.earlierCareer.map(ec => `
        <li><span class="earlier-employer">${ec.employer}</span><span>${ec.desc}</span></li>
      `).join('');

      // Skills
      const mid = Math.ceil(d.skills.length / 2);
      const sCols = [d.skills.slice(0, mid), d.skills.slice(mid)];
      document.getElementById('skills-container').innerHTML = sCols.map(col => `
        <div>${col.map(s => `
          <div class="skill-group">
            <div class="skill-cat">${s.category}</div>
            <div class="skill-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        `).join('')}</div>
      `).join('');

      // Certs
      document.getElementById('certs-container').innerHTML = d.certifications.map(c => `
        <div class="cert-item">
          <img class="cert-badge" src="${c.badge}" alt="${c.name}">
          <div class="cert-text">
            <div class="cert-name">${c.name}</div>
            <div class="cert-issuer">${c.issuer}</div>
          </div>
        </div>
      `).join('');

      // Education
      document.getElementById('edu-container').innerHTML = d.education.map(e => `
        <div class="edu-item">
          <div class="edu-year">${e.period}</div>
          <div><div class="edu-degree">${e.degree}</div><div class="edu-school">${e.school}</div></div>
          <img class="edu-logo" src="${e.logo}" alt="${e.school} logo">
        </div>
      `).join('');

      // Awards
      document.getElementById('awards-container').innerHTML = d.awards.map(a => `
        <div class="project">
          <div class="project-period">${a.detail}</div>
          <div>
            <div class="project-name">${a.title}</div>
            <p style="font-size:15.5px; color:var(--text-mid); margin-top:4px;">${a.desc}</p>
          </div>
        </div>
      `).join('');

      // Footer
      document.getElementById('footer-copy').innerHTML = `© ${new Date().getFullYear()} ${d.profile.name} &nbsp;`;
      const email = d.profile.contacts.find(c => c.link.startsWith('mailto:'));
      document.getElementById('footer-email').href = email.link;
      document.getElementById('footer-email').textContent = email.label;

      // Theme toggle
      const btn = document.getElementById('theme-toggle');
      const applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      };
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });

      // Back to top button
      const backToTop = document.getElementById('back-to-top');
      window.addEventListener('scroll', () => {
        backToTop.classList.toggle('visible', window.scrollY > 300);
      });
      backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
